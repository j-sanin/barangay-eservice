<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Digitalis Imperium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="icon" href="img/digitalis logo.jpeg">
</head>
<body>

<header class="navbar">
    <div class="company-logo">
        <img src="img/digitalis logo.jpeg" class="logo-image">
        <span class="company-name">DIGITALIS IMPERIUM</span>
    </div>
    <div class="admin-title">ADMIN PANEL</div>
    <a href="#" class="btn-logout" onclick="logout()">Logout</a>
</header>

<main class="admin-content">
    <div class="container">

        <div class="stats-row">
            <div class="stat-box red">
                <h3>⏳ Pending</h3>
                <p id="statPending">—</p>
            </div>
            <div class="stat-box green">
                <h3>✅ Approved</h3>
                <p id="statApproved">—</p>
            </div>
            <div class="stat-box blue">
                <h3>🎉 Completed</h3>
                <p id="statCompleted">—</p>
            </div>
        </div>

        <div class="request-table-container">
            <h2 class="section-title">All Resident Requests 📋</h2>
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Resident Name</th>
                            <th>Document Type</th>
                            <th>Purpose / Reason</th>
                            <th>Date Requested</th>
                            <th>Status</th>
                            <th>Release / Pickup Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr>
                            <td colspan="7" style="padding:25px; text-align:center; color:#a8b2d1;">
                                Loading requests...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<footer class="footer">
    <p>Admin System — Digitalis Imperium</p>
</footer>

<script src="js/dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const token = localStorage.getItem('token');
        const role  = localStorage.getItem('userRole');
        if (!token || role !== 'admin') {
            alert('Admin access only. Please log in.');
            window.location.href = 'admin-login.html';
        }
    });

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
