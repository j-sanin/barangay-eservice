<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay E-Service</title>
     <link rel="icon" href="img/digitalis logo.jpeg">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Open+Sans&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/register.css">

</head>

<body>

<div class="container-fluid vh-100">
  <div class="row h-100">

    <!-- LEFT FORM -->
    <div class="col-md-6 d-flex justify-content-center align-items-center bg-white">
      <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">Create Account</h3>

        <!-- Error message area -->
        <div id="formMsg" class="alert d-none" role="alert"></div>

        <form>

          <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" name="name" required>
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" name="email" required>
          </div>

          <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>

          <button type="submit" class="btn btn-primary w-100">Register</button>

        </form>

        <p class="text-center mt-3">
          Already have an account? <a href="login.html">Login</a>
        </p>

      </div>
    </div>

    <!-- RIGHT CAROUSEL -->
    <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">
      <div style="width: 80%;">
        <div id="carouselRegister" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2500">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="img/digitalis logo.jpeg" class="d-block w-100">
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/register.js"></script>

</body>
</html>
