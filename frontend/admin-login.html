<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Digitalis Imperium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-login.css">
    <link rel="icon" href="img/digitalis logo.jpeg">
</head>
<body>
<div class="admin-lock-container">
    <div class="lock-card">
        <div class="lock-icon">🔒</div>
        <h1>Admin Access</h1>
        <p>Enter your admin credentials</p>
        <form id="adminForm">
            <div style="margin-bottom:12px;">
                <input type="email" id="adminEmail" placeholder="Admin Email" required
                style="width:100%;padding:12px 15px;border-radius:8px;border:1px solid rgba(255,99,99,0.5);background:rgba(255,255,255,0.05);color:#fff;font-size:0.95rem;outline:none;box-sizing:border-box;">
            </div>
            <div class="input-group">
                <input type="password" id="adminPass" placeholder="Admin Password" required>
            </div>
            <button type="submit" id="unlockBtn" class="btn-unlock">Unlock Dashboard</button>
        </form>
        <small id="errorMsg" style="color:#ff6363;display:none;margin-top:15px;text-align:center;font-size:0.85rem;"></small>
    </div>
</div>
<script>
document.getElementById('adminForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email    = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPass').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const btn      = document.getElementById('unlockBtn');
    errorMsg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Checking...';
    try {
        const res = await fetch('https://barangay-eservice-api.onrender.com/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok || data.role !== 'admin') {
            errorMsg.textContent = data.message || 'Incorrect credentials or not an admin account.';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Unlock Dashboard';
            return;
        }
        localStorage.setItem('token',      data.token);
        localStorage.setItem('userRole',   data.role);
        localStorage.setItem('userName',   data.name);
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'admin-dashboard.html';
    } catch (err) {
        errorMsg.textContent = 'Cannot connect to server. Make sure backend is running on port 5000.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Unlock Dashboard';
    }
});
</script>
</body>
</html>
