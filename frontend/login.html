<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Barangay E-Service</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">
  <link rel="apple-touch-icon" href="icon.png">
</head>

<body>

<div class="container-fluid vh-100">
  <div class="row h-100">

    <div class="col-md-6 d-flex justify-content-center align-items-center bg-white">
      <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">Welcome Back</h3>

        <div id="errorMsg" class="alert alert-danger d-none"></div>

        <form id="loginForm">
          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" name="email" required>
          </div>
          <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button type="submit" id="loginBtn" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center mt-3">
          Don't have an account? <a href="register.html">Register</a>
        </p>

      </div>
    </div>

    <!-- RIGHT CAROUSEL -->
    <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">
      <div style="width: 80%;">
        <div id="carouselLogin" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2500">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="img/digitalis logo.jpeg" class="d-block w-100">
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email    = this.querySelector('[name="email"]').value.trim();
    const password = this.querySelector('[name="password"]').value.trim();
    const btn      = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.add('d-none');
    btn.disabled    = true;
    btn.textContent = 'Logging in...';

    try {
      const res = await fetch('https://barangay-eservice-api.onrender.com/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.message || 'Login failed. Check your email and password.';
        errorMsg.classList.remove('d-none');
        btn.disabled    = false;
        btn.textContent = 'Login';
        return;
      }

      // Save session to localStorage
      localStorage.setItem('token',      data.token);
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userRole',   data.role);
      localStorage.setItem('userName',   data.name);


      if (data.role === 'admin') {
        window.location.href = 'admin-dashboard.html';
      } else {
        window.location.href = 'homepage.html';
      }

    } catch (err) {
      errorMsg.textContent = 'Cannot connect to server. Make sure the backend is running on port 5000.';
      errorMsg.classList.remove('d-none');
      btn.disabled    = false;
      btn.textContent = 'Login';
      console.error('Login error:', err);
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
