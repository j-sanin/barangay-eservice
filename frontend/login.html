<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digitalis Imperium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" href="img/digitalis logo.jpeg">
</head>
<body>

<div class="container vh-100 d-flex align-items-center">
    <div class="row w-100">

        <!-- LEFT SIDE: LOGIN FORM -->
        <div class="col-md-6 col-lg-5 mb-4 mb-md-0">
            <div class="bg-white p-5 card">
                <h3 class="text-center mb-4">Welcome Back</h3>

                <div id="messageSuccess" class="alert alert-success d-none"></div>
                <div id="messageError" class="alert alert-danger d-none"></div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="" required>
                    </div>
                    <button type="submit" id="loginBtn" class="btn btn-primary w-100">Login</button>
                </form>

                <div class="text-center mt-4">
                    <p>Don't have an account? <a href="register.html">Register</a></p>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: IMAGE CAROUSEL -->
        <div class="col-md-6 col-lg-7">
            <div id="loginCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="img/digitalis logo.jpeg" class="d-block w-100" alt="Slide 1">
                    </div>
          
        </div>

    </div>
</div>

<!-- ✅ OTP POPUP MODAL -->
<div id="otpModal" class="otp-modal">
    <div class="modal-content bg-white">
        <div class="modal-header text-center">
            <h4>Verify Your Email</h4>
            <p>We sent a 6-digit code to <br><strong id="userEmailText"></strong></p>
            <div class="timer-box">Code expires in: <span id="timer">10:00</span></div>
        </div>

        <div id="otpSuccess" class="alert alert-success d-none"></div>
        <div id="otpError" class="alert alert-danger d-none"></div>

        <div class="otp-input-group d-flex justify-content-between gap-2 mb-4">
            <input type="text" class="otp-box form-control text-center" maxlength="1" inputmode="numeric" oninput="moveNext(this, 1)">
            <input type="text" class="otp-box form-control text-center" maxlength="1" inputmode="numeric" oninput="moveNext(this, 2)">
            <input type="text" class="otp-box form-control text-center" maxlength="1" inputmode="numeric" oninput="moveNext(this, 3)">
            <input type="text" class="otp-box form-control text-center" maxlength="1" inputmode="numeric" oninput="moveNext(this, 4)">
            <input type="text" class="otp-box form-control text-center" maxlength="1" inputmode="numeric" oninput="moveNext(this, 5)">
            <input type="text" class="otp-box form-control text-center" maxlength="1" inputmode="numeric" oninput="moveNext(this, 6)">
        </div>

        <button id="verifyOtpBtn" class="btn btn-primary w-100 mb-2">Verify Code</button>
        <button id="closeModalBtn" class="btn btn-outline-secondary w-100">Close</button>

        <div class="text-center mt-3">
            <p class="mb-0">Didn't receive code? <a href="#" id="resendOtp">Resend OTP</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- ✅ 2 JS FILES SEPARATED -->
<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
