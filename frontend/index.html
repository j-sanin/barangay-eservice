<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay E-Service</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <link rel="icon" href="img/digitalis logo.jpeg">
    <link rel="manifest" href="manifest.json">
     <meta name="theme-color" content="#007bff">
     <meta name="apple-mobile-web-app-capable" content="yes">
     <meta name="apple-mobile-web-app-title" content="Barangay E-Service">
     <link rel="apple-touch-icon" href="icon.png">
</head>

<body>

<header class="navbar">
    <div class="company-logo">
        <img src="img/digitalis logo.jpeg" class="logo-image">
        <span class="company-name">DIGITALIS IMPERIUM</span>
    </div>


</header>

<main class="hero-section">

    <!-- LEFT -->
    <div class="content-left">
        <h1>Barangay e-Services</h1>
        <h2>Fast & Convenient</h2>
        <p>
            Request barangay documents easily online. This system makes the process faster,
            secure, and convenient for all residents.
        </p>

        <div class="cta-buttons">
            <a href="register.html" class="button trial-button">Sign Up</a>
            <a href="login.html" class="button premium-button">Login</a>
        </div>
    </div>

    <!-- RIGHT CAROUSEL -->
    <div class="content-right">
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2500">

            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="img/homepage.jpg" class="d-block w-100">
                </div>

                <div class="carousel-item">
                    <img src="img/homepage2.jpg" class="d-block w-100">
                </div>
            </div>

        </div>
    </div>

</main>

<footer class="footer">
    <div class="footer-links">
        <a href="#" class="footer-item">Legal</a>
        <a href="#" class="footer-item">IMPERIUM</a>
        <a href="#" class="footer-item">About</a>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.log('Service Worker Error:', err));
    }
  </script>
</body>
</html>
