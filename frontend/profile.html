<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay E-Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/profile.css"> 
     <link rel="icon" href="img/digitalis logo.jpeg">
</head>
<body>
<header class="navbar">
    <div class="company-logo">
        <img src="img/digitalis logo.jpeg" class="logo-image">
        <span class="company-name">DIGITALIS IMPERIUM</span>
    </div>
    <nav class="nav-links">
        <a href="homepage.html" class="nav-item">Home</a>
        <a href="documents.html" class="nav-item">Documents</a>   
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="profile.html" class="nav-item active">Profile</a>
     
        <a href="#" class="nav-item" onclick="logout()">Logout</a>
    </nav>
</header>

<main class="profile-content">
    <div class="container">
        <div class="profile-card">

            <div id="messageSuccess" class="alert alert-success"></div>
            <div id="messageError" class="alert alert-error"></div>

            <div class="profile-header">
                <div class="avatar-container">
                    <i class="fa-solid fa-circle-user"></i>
                </div>
                <h1 class="profile-name" id="displayName">Loading...</h1>
                <span class="role-badge" id="displayRole">USER</span>
            </div>

            <div class="profile-body">
                <h3 class="section-title">Personal Information</h3>

                <div class="info-grid">
                    <div class="info-item">
                        <label>Full Name</label>
                        <p class="static-text" id="profileName">—</p>
                        <input type="text" class="edit-input" id="inputName" placeholder="Enter Full Name">
                    </div>

                    <div class="info-item">
                        <label>Email</label>
                        <p class="static-text" id="profileEmail">—</p>
                        <input type="email" class="edit-input" id="inputEmail" placeholder="Enter Email" readonly>
                    </div>

                    <div class="info-item">
                        <label>Address</label>
                        <p class="static-text" id="profileAddress">—</p>
                        <input type="text" class="edit-input" id="inputAddress" placeholder="Enter Address">
                    </div>

                    <div class="info-item">
                        <label>Contact Number</label>
                        <p class="static-text" id="profileContact">—</p>
                        <input type="text" class="edit-input" id="inputContact" placeholder="Enter Contact Number">
                    </div>
                </div>

                <button class="btn-edit" id="editBtn" onclick="toggleEdit()">Edit Profile</button>
            </div>

        </div>
    </div>
</main>

<footer class="footer">
    <div class="footer-links">
        <a href="#" class="footer-item">Legal</a>
        <a href="#" class="footer-item">IMPERIUM</a>
        <a href="#" class="footer-item">About</a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
